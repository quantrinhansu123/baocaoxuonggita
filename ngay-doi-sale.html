<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Ngày Đôi & Ngày Sale Lương 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* Header */
        .page-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            padding: 24px 32px;
            border-bottom: 3px solid #f5c518;
            color: #ffffff;
            text-align: center;
        }

        .page-title {
            font-size: 22px;
            font-weight: 800;
            color: #f5c518;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .page-sub {
            font-size: 14px;
            font-weight: 500;
            color: #aaa;
        }

        /* Controls */
        .control-bar {
            background: #ffffff;
            margin: 24px 32px;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn {
            border: 1px solid #e2e8f0;
            background: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: #0f3460;
            color: #0f3460;
            background: #f8f9ff;
        }

        .filter-btn.active {
            background: #0f3460;
            border-color: #0f3460;
            color: #ffffff;
        }

        .search-input {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            font-size: 13px;
            outline: none;
            width: 250px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #0f3460;
        }

        .btn-primary {
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary:hover { opacity: 0.92; }

        /* Table View */
        .table-view {
            padding: 0 32px;
        }

        .table-container {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        .data-table th {
            background: #1a1a2e;
            color: #f5c518;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 14px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            color: #334155;
        }

        .data-table tbody tr:hover {
            background: #f8fafc;
        }

        .month-row {
            background: #f1f5f9;
        }

        .month-row td {
            font-weight: 700;
            color: #0f3460;
            padding: 10px 20px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .type-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .type-sale {
            background: #f1f5f9;
            color: #475569;
        }

        .type-double {
            background: #fdf4ff;
            color: #c026d3;
            border: 1px solid #fae8ff;
        }

        .col-date {
            font-weight: 600;
            color: #0f172a;
        }

        .col-day {
            color: #64748b;
        }

        .col-action {
            font-weight: 500;
        }

        .actions-cell {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
        }
        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #fff;
            cursor: pointer;
        }
        .icon-btn.edit { color: #0f3460; border-color: #bfdbfe; background: #eff6ff; }
        .icon-btn.delete { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }
        .icon-btn:hover { filter: brightness(0.96); }

        /* Double day highlight row */
        .highlight-row {
            background: #faf5ff;
        }

        .highlight-row:hover {
            background: #f3e8ff;
        }

        .highlight-row .col-date {
            color: #9333ea;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px;
            color: #64748b;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 16px;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
            width: min(560px, 100%);
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .modal-head {
            padding: 14px 18px;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 800;
            color: #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body { padding: 14px 18px; display: grid; gap: 12px; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .field label {
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            display: block;
            margin-bottom: 6px;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
        }
        .field textarea { min-height: 84px; resize: vertical; }
        .field.span-2 { grid-column: span 2; }
        .modal-foot {
            padding: 12px 18px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn-light {
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #334155;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        @media(max-width: 768px) {
            .page-header,
            .control-bar,
            .table-view {
                padding-left: 16px;
                padding-right: 16px;
            }

            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="page-header">
        <div class="page-title">LỊCH NGÀY ĐÔI VÀ NGÀY SALE LƯƠNG 5-15-25 NĂM 2026</div>
        <div class="page-sub">
            Các ngày đôi: 6.6 | 7.7 | 8.8 | 9.9 | 10.10 | 11.11 | 12.12 &nbsp;&nbsp;|&nbsp;&nbsp; Ngày sale lương: 5, 15, 25 hằng tháng
        </div>
    </div>

    <!-- Controls -->
    <div class="control-bar">
        <div class="filter-group" id="typeFilterGroup">
            <span class="filter-label">Lọc theo loại:</span>
            <div id="typeFilterButtons" class="filter-group" style="gap:6px;"></div>
            <span id="typeFilterCount" style="font-size:12px;color:#64748b;font-weight:600;"></span>
        </div>

        <div class="filter-group">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tìm kiếm sự kiện, gợi ý hành động...">
            <button class="btn-primary" id="addRowBtn"><i class="fa-solid fa-plus"></i> Thêm ngày</button>
        </div>
    </div>

    <!-- Table View -->
    <div class="table-view">
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 80px; text-align: center;">Tháng</th>
                        <th style="width: 100px;">Ngày</th>
                        <th style="width: 160px;">Loại</th>
                        <th style="width: 120px;">Thứ</th>
                        <th>Gợi ý hành động</th>
                        <th style="width: 110px; text-align: right;">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rendered dynamically -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fa-solid fa-calendar-xmark" style="font-size: 32px; color: #cbd5e1; margin-bottom: 12px;"></i>
                <p>Không tìm thấy sự kiện nào phù hợp.</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="eventModal">
        <div class="modal-card">
            <div class="modal-head">
                <span id="modalTitle">Thêm ngày đặc biệt</span>
                <button class="btn-light" type="button" id="closeModalBtn">Đóng</button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="field">
                        <label for="fDate">Ngày</label>
                        <input id="fDate" type="date">
                    </div>
                    <div class="field">
                        <label for="fType">Loại</label>
                        <select id="fType"></select>
                    </div>
                    <div class="field">
                        <label for="fName">Tên hiển thị</label>
                        <input id="fName" type="text" placeholder="Ví dụ: 9.9">
                    </div>
                    <div class="field">
                        <label for="fDay">Thứ</label>
                        <input id="fDay" type="text" placeholder="Ví dụ: Thứ 4">
                    </div>
                    <div class="field span-2">
                        <label for="fAction">Gợi ý hành động</label>
                        <textarea id="fAction" placeholder="Nội dung chiến dịch..."></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn-light" type="button" id="cancelModalBtn">Hủy</button>
                <button class="btn-primary" type="button" id="saveModalBtn">Lưu</button>
            </div>
        </div>
    </div>

    <script>
        const APP_ID = 'fb394ab7-2164-4da6-a15e-9e06fefaccb0';
        const API_KEY = 'V2-wpK1r-oW88b-9sL5Z-DMxbg-zUWg1-FX50y-91Plm-sPMOc';
        const TABLE_NAME = 'Ngày đặc biệt';
        const API_URL = `https://api.appsheet.com/api/v2/apps/${APP_ID}/tables/${encodeURIComponent(TABLE_NAME)}/Action`;

        const KEY_ALIASES = ['ID', 'ID Key', 'id', '_RowNumber'];
        const DATE_ALIASES = ['ngày', 'date', 'ngay'];
        const TYPE_ALIASES = ['loại', 'loai', 'type'];
        const NAME_ALIASES = ['tên', 'ten', 'sự kiện', 'su kien', 'tên hiển thị', 'ten hien thi'];
        const DAY_ALIASES = ['thứ', 'thu', 'day'];
        const ACTION_ALIASES = ['gợi ý hành động', 'goi y hanh dong', 'action', 'nội dung', 'noi dung'];

        let rawRows = [];
        let columnMap = {};
        let currentEditRowKey = '';

        let activeFilter = 'all';
        let searchQuery = '';

        function norm(s) {
            return String(s ?? '').trim().toLowerCase().normalize('NFD').replace(/\p{M}/gu, '');
        }
        function findColKey(sampleRow, aliases) {
            if (!sampleRow) return '';
            for (const k of Object.keys(sampleRow)) {
                const nk = norm(k);
                if (aliases.some(a => nk === norm(a) || nk.includes(norm(a)))) return k;
            }
            return '';
        }
        function getMap(sampleRow) {
            return {
                key: findColKey(sampleRow, KEY_ALIASES),
                date: findColKey(sampleRow, DATE_ALIASES),
                type: findColKey(sampleRow, TYPE_ALIASES),
                name: findColKey(sampleRow, NAME_ALIASES),
                day: findColKey(sampleRow, DAY_ALIASES),
                action: findColKey(sampleRow, ACTION_ALIASES)
            };
        }
        function toIsoDate(value) {
            const v = String(value ?? '').trim();
            if (!v) return '';
            if (/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0, 10);
            const m = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (m) return `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
            const d = new Date(v);
            if (Number.isNaN(d.getTime())) return '';
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        function formatDateDM(iso) {
            if (!iso) return '';
            const p = iso.split('-');
            if (p.length !== 3) return iso;
            return `${p[2]}/${p[1]}`;
        }
        function monthFromIso(iso) {
            const p = String(iso || '').split('-');
            return p.length >= 2 ? `T${Number(p[1]) || ''}` : '';
        }
        function rowToView(r) {
            const iso = toIsoDate(columnMap.date ? r[columnMap.date] : '');
            const name = columnMap.name ? String(r[columnMap.name] || '').trim() : '';
            const typeRaw = columnMap.type ? String(r[columnMap.type] || '').trim() : '';
            const action = columnMap.action ? String(r[columnMap.action] || '').trim() : '';
            const day = columnMap.day ? String(r[columnMap.day] || '').trim() : '';
            const isDouble = norm(typeRaw).includes('doi') || /\d{1,2}\.\d{1,2}/.test(typeRaw) || norm(typeRaw).includes('double');
            const typeLabel = typeRaw || name || (isDouble ? 'Ngày đôi' : 'Sale lương');
            return {
                key: columnMap.key ? String(r[columnMap.key] || '') : '',
                month: monthFromIso(iso),
                date: formatDateDM(iso),
                isoDate: iso,
                typeRaw: typeRaw,
                typeKey: norm(typeRaw) || '__empty__',
                type: typeLabel,
                day: day || '',
                action: action || '',
                isDouble: isDouble
            };
        }

        function getUniqueTypes() {
            const map = new Map();
            rawRows.forEach((r) => {
                const typeRaw = columnMap.type ? String(r[columnMap.type] || '').trim() : '';
                const key = norm(typeRaw) || '__empty__';
                const label = typeRaw || '(Trống)';
                if (!map.has(key)) map.set(key, label);
            });
            return Array.from(map.entries()).sort((a, b) => a[1].localeCompare(b[1], 'vi'));
        }

        function populateTypeSelect(selectedValue) {
            const select = document.getElementById('fType');
            if (!select) return;
            const types = getUniqueTypes();
            select.innerHTML = '';
            const defaults = ['Sale lương', 'Ngày đôi'];
            const labels = types.length ? types.map(([, label]) => label) : defaults;
            labels.forEach((label) => {
                const opt = document.createElement('option');
                opt.value = label;
                opt.textContent = label;
                select.appendChild(opt);
            });
            if (selectedValue && ![...select.options].some((o) => o.value === selectedValue)) {
                const extra = document.createElement('option');
                extra.value = selectedValue;
                extra.textContent = selectedValue;
                select.appendChild(extra);
            }
            if (selectedValue) select.value = selectedValue;
            else if (select.options.length) select.selectedIndex = 0;
        }

        function renderTypeFilters() {
            const container = document.getElementById('typeFilterButtons');
            if (!container) return;

            const types = getUniqueTypes();
            if (activeFilter !== 'all' && !types.some(([key]) => key === activeFilter)) {
                activeFilter = 'all';
            }

            container.innerHTML = '';
            const allBtn = document.createElement('button');
            allBtn.type = 'button';
            allBtn.className = 'filter-btn' + (activeFilter === 'all' ? ' active' : '');
            allBtn.dataset.type = 'all';
            allBtn.textContent = 'Tất cả';
            container.appendChild(allBtn);

            types.forEach(([key, label]) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'filter-btn' + (activeFilter === key ? ' active' : '');
                btn.dataset.type = key;
                btn.textContent = label;
                container.appendChild(btn);
            });

            container.querySelectorAll('.filter-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    container.querySelectorAll('.filter-btn').forEach((b) => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilter = btn.dataset.type;
                    renderTable();
                });
            });

        }
        async function appsheetRequest(action, rows) {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'ApplicationAccessKey': API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ Action: action, Properties: { Locale: 'vi-VN', Timezone: 'Asia/Ho_Chi_Minh' }, Rows: rows || [] })
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || `HTTP ${response.status}`);
            }
            const out = await response.json().catch(() => ([]));
            return Array.isArray(out) ? out : [];
        }
        async function loadRows() {
            rawRows = await appsheetRequest('Find', []);
            columnMap = getMap(rawRows[0] || {});
            renderTypeFilters();
            populateTypeSelect();
            renderTable();
        }
        function getFilteredRows() {
            return rawRows.map(rowToView).filter(row => {
                if (activeFilter !== 'all' && row.typeKey !== activeFilter) return false;
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    if (!row.type.toLowerCase().includes(q) &&
                        !row.typeRaw.toLowerCase().includes(q) &&
                        !row.action.toLowerCase().includes(q) &&
                        !row.date.includes(q)) return false;
                }
                return true;
            }).sort((a, b) => (a.isoDate || '').localeCompare(b.isoDate || ''));
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            // Filter logic
            const filtered = getFilteredRows();
            const countEl = document.getElementById('typeFilterCount');
            if (countEl) {
                countEl.textContent = (activeFilter === 'all' && !searchQuery)
                    ? `${rawRows.length} dòng`
                    : `Hiển thị ${filtered.length} / ${rawRows.length}`;
            }

            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.style.display = 'block';
                return;
            } else {
                emptyState.style.display = 'none';
            }

            let lastMonth = '';

            filtered.forEach(row => {
                if (row.month !== lastMonth && activeFilter === 'all' && !searchQuery) {
                    const tr = document.createElement('tr');
                    tr.className = 'month-row';
                    tr.innerHTML = `<td colspan="6">🗓️ Tháng ${row.month.replace('T', '')}</td>`;
                    tbody.appendChild(tr);
                    lastMonth = row.month;
                }

                const tr = document.createElement('tr');
                if (row.isDouble) tr.className = 'highlight-row';
                
                const typeBadgeCls = row.isDouble ? 'type-double' : 'type-sale';
                const typeIcon = row.isDouble ? '🟣' : '💳';
                
                tr.innerHTML = `
                    <td style="text-align: center; color: ${row.isDouble ? '#9333ea' : '#64748b'}; font-weight: 600;">${row.month}</td>
                    <td class="col-date">${row.date}</td>
                    <td><span class="type-badge ${typeBadgeCls}">${typeIcon} &nbsp;${row.type}</span></td>
                    <td class="col-day">${row.day}</td>
                    <td class="col-action">${row.action}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="icon-btn edit" title="Sửa" data-action="edit" data-key="${row.key}"><i class="fa-solid fa-pen"></i></button>
                            <button class="icon-btn delete" title="Xóa" data-action="delete" data-key="${row.key}"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(isEdit, key) {
            const modal = document.getElementById('eventModal');
            const title = document.getElementById('modalTitle');
            const fDate = document.getElementById('fDate');
            const fType = document.getElementById('fType');
            const fName = document.getElementById('fName');
            const fDay = document.getElementById('fDay');
            const fAction = document.getElementById('fAction');
            currentEditRowKey = isEdit ? key : '';
            title.textContent = isEdit ? 'Sửa ngày đặc biệt' : 'Thêm ngày đặc biệt';
            fDate.value = '';
            fName.value = '';
            fDay.value = '';
            fAction.value = '';
            let selectedType = getUniqueTypes()[0]?.[1] || 'Sale lương';
            if (isEdit) {
                const row = rawRows.find(r => String(columnMap.key ? r[columnMap.key] : '') === String(key));
                if (row) {
                    fDate.value = toIsoDate(columnMap.date ? row[columnMap.date] : '');
                    selectedType = columnMap.type ? String(row[columnMap.type] || '').trim() : selectedType;
                    fName.value = columnMap.name ? String(row[columnMap.name] || '') : '';
                    fDay.value = columnMap.day ? String(row[columnMap.day] || '') : '';
                    fAction.value = columnMap.action ? String(row[columnMap.action] || '') : '';
                }
            }
            populateTypeSelect(selectedType);
            modal.classList.add('show');
        }
        function closeModal() { document.getElementById('eventModal').classList.remove('show'); }
        async function saveModal() {
            const fDate = document.getElementById('fDate').value;
            const fType = document.getElementById('fType').value;
            const fName = document.getElementById('fName').value.trim();
            const fDay = document.getElementById('fDay').value.trim();
            const fAction = document.getElementById('fAction').value.trim();
            if (!fDate) { alert('Vui lòng chọn ngày'); return; }
            const payload = {};
            if (columnMap.date) payload[columnMap.date] = fDate;
            if (columnMap.type) payload[columnMap.type] = fType;
            if (columnMap.name) payload[columnMap.name] = fName || fType || '';
            if (columnMap.day) payload[columnMap.day] = fDay;
            if (columnMap.action) payload[columnMap.action] = fAction;
            if (currentEditRowKey) {
                payload[columnMap.key] = currentEditRowKey;
                await appsheetRequest('Edit', [payload]);
            } else {
                await appsheetRequest('Add', [payload]);
            }
            closeModal();
            await loadRows();
        }
        async function deleteRow(key) {
            if (!key) return;
            if (!confirm('Bạn có chắc muốn xóa dòng này?')) return;
            const payload = {};
            payload[columnMap.key] = key;
            await appsheetRequest('Delete', [payload]);
            await loadRows();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            renderTable();
        });

        document.getElementById('addRowBtn').addEventListener('click', () => openModal(false, ''));
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
        document.getElementById('saveModalBtn').addEventListener('click', async () => {
            try { await saveModal(); } catch (e) { alert('Lưu thất bại: ' + (e.message || e)); }
        });
        document.getElementById('eventModal').addEventListener('click', (e) => {
            if (e.target.id === 'eventModal') closeModal();
        });
        document.getElementById('tableBody').addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const key = btn.dataset.key || '';
            if (btn.dataset.action === 'edit') {
                openModal(true, key);
            } else if (btn.dataset.action === 'delete') {
                try { await deleteRow(key); } catch (err) { alert('Xóa thất bại: ' + (err.message || err)); }
            }
        });

        // Initial render
        loadRows().catch(err => {
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('emptyState').innerHTML = '<p>Không tải được dữ liệu bảng Ngày đặc biệt: ' + (err.message || err) + '</p>';
        });

    </script>
</body>

</html>
