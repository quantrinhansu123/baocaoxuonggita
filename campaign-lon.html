<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Danh Sách Campaign Lớn 2026 — Guitar Sài Thành</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* Header */
        .page-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            padding: 28px 32px;
            border-bottom: 3px solid #f5c518;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 800;
            color: #f5c518;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-sub {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }

        .warning-badge {
            background: #7f1d1d;
            border: 1px solid #f87171;
            color: #fca5a5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Dashboard Urgency Bar */
        .urgency-section {
            padding: 24px 32px 0;
        }

        .urgency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .urgency-card {
            background: #ffffff;
            border-radius: 12px;
            border-left: 6px solid #e11d48;
            padding: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .urgency-card.warning {
            border-left-color: #f59e0b;
        }

        .urgency-tag {
            align-self: flex-start;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            background: #ffe4e6;
            color: #e11d48;
        }

        .urgency-tag.warning {
            background: #fef3c7;
            color: #d97706;
        }

        .urgency-title {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }

        .urgency-time {
            font-size: 12px;
            color: #64748b;
        }

        /* Controls */
        .control-bar {
            background: #ffffff;
            margin: 24px 32px;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .view-toggle {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
        }

        .toggle-btn {
            border: none;
            background: transparent;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-btn.active {
            background: #ffffff;
            color: #0f3460;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .search-input {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            font-size: 13px;
            outline: none;
            width: 250px;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #0f3460;
            box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
        }

        /* Cards Grid View */
        .cards-view {
            padding: 0 32px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .campaign-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .campaign-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-color: #cbd5e1;
        }

        .card-header {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stt-badge {
            background: #e2e8f0;
            color: #475569;
            font-size: 11px;
            font-weight: 700;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .date-info {
            text-align: right;
        }

        .date-main {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
        }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .campaign-name {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.3;
        }

        .campaign-msg {
            font-size: 13.5px;
            color: #475569;
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 8px;
            border-left: 3px solid #818cf8;
            font-style: italic;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .prep-box {
            background: #fef2f2;
            border: 1px dashed #fecaca;
            padding: 10px 14px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prep-date {
            font-size: 13px;
            font-weight: 700;
            color: #dc2626;
        }

        .prep-countdown {
            font-size: 11.5px;
            font-weight: 600;
            color: #ef4444;
            background: #fee2e2;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .prep-countdown.safe {
            color: #059669;
            background: #d1fae5;
        }

        .channels-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .channel-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            background: #e8edf5;
            color: #0f3460;
        }

        .channel-tag.all {
            background: #ecfdf5;
            color: #059669;
        }

        /* Table View */
        .table-view {
            padding: 0 32px;
        }

        .table-container {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13.5px;
            text-align: left;
        }

        .data-table th {
            background: #1a1a2e;
            color: #f5c518;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .data-table tbody tr:hover {
            background: #f8fafc;
        }

        .table-stt {
            font-weight: 700;
            color: #64748b;
        }

        .table-time {
            font-weight: 700;
            color: #1e293b;
        }

        .table-name {
            font-weight: 800;
            color: #0f172a;
        }

        .table-prep {
            font-weight: 700;
            color: #dc2626;
            background: #fef2f2;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Filters */
        .channel-filter-btn {
            border: 1.5px solid #e2e8f0;
            background: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12.5px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }

        .channel-filter-btn:hover {
            border-color: #0f3460;
            color: #0f3460;
        }

        .channel-filter-btn.active {
            background: #0f3460;
            border-color: #0f3460;
            color: #ffffff;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px dashed #cbd5e1;
            color: #64748b;
        }

        @media(max-width: 768px) {

            .page-header,
            .urgency-section,
            .control-bar,
            .cards-view,
            .table-view {
                padding-left: 16px;
                padding-right: 16px;
            }

            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="page-header">
        <div class="header-content">
            <div>
                <div class="page-title">🔥 DANH SÁCH CAMPAIGN LỚN 2026</div>
                <div class="page-sub">Kế hoạch chuẩn bị trước ít nhất 2 tuần cho các ngày lễ & chiến dịch quan trọng
                </div>
            </div>
            <div class="warning-badge">
                <i class="fa-solid fa-triangle-exclamation"></i> Cần chuẩn bị trước ít nhất 2 tuần!
            </div>
        </div>
    </div>

    <!-- Urgency Dashboard -->
    <div class="urgency-section">
        <div
            style="font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
            <i class="fa-solid fa-bell-concierge" style="color: #0f3460;"></i> Chiến dịch cần ưu tiên chuẩn bị gấp:
        </div>
        <div class="urgency-grid" id="urgencyGrid">
            <!-- Renders dynamically -->
        </div>
    </div>

    <!-- Controls -->
    <div class="control-bar">
        <div class="filter-group">
            <span class="filter-label">Kênh:</span>
            <button class="channel-filter-btn active" data-channel="all">Tất cả</button>
            <button class="channel-filter-btn" data-channel="FB">Facebook</button>
            <button class="channel-filter-btn" data-channel="TikTok">TikTok</button>
            <button class="channel-filter-btn" data-channel="Shopee">Shopee</button>
        </div>

        <div class="filter-group">
            <div class="view-toggle">
                <button class="toggle-btn active" id="cardViewBtn">
                    <i class="fa-solid fa-grip"></i> Card View
                </button>
                <button class="toggle-btn" id="tableViewBtn">
                    <i class="fa-solid fa-list"></i> Table View
                </button>
            </div>
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tìm tên chiến dịch, thông điệp...">
        </div>
    </div>

    <!-- Content View Containers -->
    <div class="cards-view" id="cardsView">
        <!-- Rendered dynamically -->
    </div>

    <div class="table-view" id="tableView" style="display: none;">
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 60px;">STT</th>
                        <th style="width: 120px;">Thời gian</th>
                        <th>Tên Campaign</th>
                        <th>Thông điệp chủ đạo</th>
                        <th>Kênh triển khai</th>
                        <th style="width: 180px;">Chuẩn bị trước</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rendered dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Data representation from sheet image
        const CAMPAIGNS = [
            { stt: 1, date: '01/01', name: 'Tết Dương Lịch', msg: 'Chào năm mới — kết nối âm nhạc', channels: ['FB', 'TikTok', 'Shopee'], prep: '20/12', parseDate: '2026-01-01', parsePrep: '2025-12-20' },
            { stt: 2, date: '14/02', name: "Valentine's Day", msg: 'Tặng đàn cho người yêu', channels: ['TikTok', 'FB', 'Shopee'], prep: '01/02', parseDate: '2026-02-14', parsePrep: '2026-02-01' },
            { stt: 3, date: '16–20/02', name: 'Tết Nguyên Đán', msg: 'Xuân Bính Ngọ — tiếng đàn khai xuân', channels: ['Tất cả kênh'], prep: '05/01', parseDate: '2026-02-16', parsePrep: '2026-01-05' },
            { stt: 4, date: '08/03', name: 'Ngày Phụ nữ', msg: 'Những cô gái chơi đàn', channels: ['FB', 'TikTok', 'Reels'], prep: '25/02', parseDate: '2026-03-08', parsePrep: '2026-02-25' },
            { stt: 5, date: '30/04–01/05', name: '30/4 & Lao Động', msg: 'Mega sale — lịch sử & đam mê', channels: ['Tất cả kênh'], prep: '15/04', parseDate: '2026-04-30', parsePrep: '2026-04-15' },
            { stt: 6, date: '10/05', name: "Mother's Day", msg: 'Tăng mẹ bản nhạc đầu đời', channels: ['TikTok', 'FB'], prep: '01/05', parseDate: '2026-05-10', parsePrep: '2026-05-01' },
            { stt: 7, date: '01/06', name: 'Quốc tế Thiếu nhi', msg: 'Bé học đàn — STEAM cho trẻ', channels: ['TikTok', 'FB'], prep: '20/05', parseDate: '2026-06-01', parsePrep: '2026-05-20' },
            { stt: 8, date: '06/06', name: 'Sale 6.6', msg: 'Flash deal 6.6 Shopee', channels: ['Shopee', 'TikTok Shop'], prep: '01/06', parseDate: '2026-06-06', parsePrep: '2026-06-01' },
            { stt: 9, date: '02/07', name: '50 năm Tp.HCM', msg: 'Guitar của người Sài Gòn', channels: ['FB', 'TikTok'], prep: '20/06', parseDate: '2026-07-02', parsePrep: '2026-06-20' },
            { stt: 10, date: '07/07', name: 'Thất Tịch 7.7', msg: 'Cặp đôi học đàn — ngày đôi', channels: ['TikTok Shop', 'Shopee'], prep: '01/07', parseDate: '2026-07-07', parsePrep: '2026-07-01' },
            { stt: 11, date: 'Mid T8', name: 'Back to School', msg: 'Học kỳ này học đàn', channels: ['TikTok', 'FB', 'Shopee'], prep: '01/08', parseDate: '2026-08-15', parsePrep: '2026-08-01' },
            { stt: 12, date: '08/08', name: 'Sale 8.8', msg: 'Bundle deal 8.8', channels: ['Shopee', 'TikTok Shop'], prep: '03/08', parseDate: '2026-08-08', parsePrep: '2026-08-03' },
            { stt: 13, date: '02/09', name: 'Quốc khánh 2/9', msg: 'Tự hào Việt Nam — nhạc cụ Việt', channels: ['Tất cả kênh'], prep: '25/08', parseDate: '2026-09-02', parsePrep: '2026-08-25' }
        ];

        let currentFilterChannel = 'all';
        let searchQuery = '';

        // Calculate countdown in days
        function getDaysDiff(targetDateStr) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(targetDateStr);
            const diffTime = target - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function renderUrgency() {
            const grid = document.getElementById('urgencyGrid');
            grid.innerHTML = '';

            // Sort campaigns by the prep date closest to current date or already passed but upcoming
            const sorted = [...CAMPAIGNS]
                .map(c => ({ ...c, daysLeft: getDaysDiff(c.parsePrep) }))
                .filter(c => c.daysLeft <= 30 && c.daysLeft >= -5) // upcoming or just started
                .sort((a, b) => a.daysLeft - b.daysLeft);

            if (sorted.length === 0) {
                grid.innerHTML = `
                <div class="urgency-card warning" style="grid-column: 1 / -1; align-items: center; justify-content: center; text-align: center; border-left-color: #10b981;">
                    <span class="urgency-tag" style="background: #d1fae5; color: #065f46;">An toàn</span>
                    <div class="urgency-title" style="margin-top: 4px;">Không có chiến dịch nào khẩn cấp trong 30 ngày tới.</div>
                </div>
            `;
                return;
            }

            sorted.slice(0, 3).forEach(c => {
                const isDanger = c.daysLeft <= 7;
                const cls = isDanger ? '' : 'warning';
                const icon = isDanger ? '<i class="fa-solid fa-triangle-exclamation"></i>' : '<i class="fa-solid fa-clock"></i>';
                const statusText = c.daysLeft < 0 ? 'Quá hạn chuẩn bị' : (c.daysLeft === 0 ? 'Bắt đầu chuẩn bị hôm nay' : `Còn ${c.daysLeft} ngày chuẩn bị`);

                grid.innerHTML += `
                <div class="urgency-card ${cls}">
                    <span class="urgency-tag ${cls}">${icon} ${statusText}</span>
                    <div class="urgency-title">${c.name}</div>
                    <div class="urgency-time">Thời gian chạy: <strong>${c.date}</strong> (Bắt đầu chuẩn bị: Từ ${c.prep})</div>
                </div>
            `;
            });
        }

        function render() {
            const cardsView = document.getElementById('cardsView');
            const tableBody = document.getElementById('tableBody');

            let filtered = CAMPAIGNS.filter(c => {
                // Channel filter
                if (currentFilterChannel !== 'all') {
                    const hasChan = c.channels.some(ch => ch.toLowerCase().includes(currentFilterChannel.toLowerCase())) || c.channels.includes('Tất cả kênh');
                    if (!hasChan) return false;
                }
                // Search filter
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    return c.name.toLowerCase().includes(query) || c.msg.toLowerCase().includes(query);
                }
                return true;
            });

            // Clear views
            cardsView.innerHTML = '';
            tableBody.innerHTML = '';

            if (filtered.length === 0) {
                const emptyHtml = `
                <div class="empty-state">
                    <i class="fa-solid fa-circle-question" style="font-size: 32px; color: #cbd5e1; margin-bottom: 12px;"></i>
                    <p>Không tìm thấy chiến dịch nào thỏa mãn bộ lọc</p>
                </div>
            `;
                cardsView.innerHTML = emptyHtml;
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #94a3b8; padding: 24px;">Không tìm thấy dữ liệu</td></tr>`;
                return;
            }

            filtered.forEach(c => {
                const daysToPrep = getDaysDiff(c.parsePrep);
                let countdownText = '';
                let countdownClass = '';

                if (daysToPrep < 0) {
                    countdownText = `Quá hạn ${Math.abs(daysToPrep)} ngày`;
                    countdownClass = '';
                } else if (daysToPrep === 0) {
                    countdownText = 'Bắt đầu hôm nay!';
                    countdownClass = '';
                } else {
                    countdownText = `${daysToPrep} ngày nữa`;
                    countdownClass = daysToPrep > 14 ? 'safe' : '';
                }

                // Cards
                const cardHtml = `
                <div class="campaign-card">
                    <div class="card-header">
                        <span class="stt-badge">${c.stt}</span>
                        <div class="date-info">
                            <div class="section-label">Thời gian chạy</div>
                            <div class="date-main"><i class="fa-regular fa-calendar-days"></i> ${c.date}</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="campaign-name">${c.name}</div>
                        <div class="campaign-msg">"${c.msg}"</div>
                        <div>
                            <div class="section-label">Kênh triển khai</div>
                            <div class="channels-wrapper">
                                ${c.channels.map(ch => `<span class="channel-tag ${ch === 'Tất cả kênh' ? 'all' : ''}">${ch}</span>`).join('')}
                            </div>
                        </div>
                        <div class="prep-box">
                            <div>
                                <div class="section-label" style="color: #ef4444; margin-bottom: 2px;">Chuẩn bị trước</div>
                                <div class="prep-date"><i class="fa-solid fa-circle-play"></i> Từ ${c.prep}</div>
                            </div>
                            <span class="prep-countdown ${countdownClass}">${countdownText}</span>
                        </div>
                    </div>
                </div>
            `;
                cardsView.innerHTML += cardHtml;

                // Table rows
                const rowHtml = `
                <tr>
                    <td class="table-stt">${c.stt}</td>
                    <td class="table-time">${c.date}</td>
                    <td class="table-name">${c.name}</td>
                    <td><div style="font-style: italic; color: #475569;">"${c.msg}"</div></td>
                    <td>
                        <div class="channels-wrapper">
                            ${c.channels.map(ch => `<span class="channel-tag ${ch === 'Tất cả kênh' ? 'all' : ''}">${ch}</span>`).join('')}
                        </div>
                    </td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="table-prep">Từ ${c.prep}</span>
                            <span class="prep-countdown ${countdownClass}" style="font-size: 11px;">${countdownText}</span>
                        </div>
                    </td>
                </tr>
            `;
                tableBody.innerHTML += rowHtml;
            });
        }

        // Event listeners for toggle view
        document.getElementById('cardViewBtn').addEventListener('click', () => {
            document.getElementById('cardViewBtn').classList.add('active');
            document.getElementById('tableViewBtn').classList.remove('active');
            document.getElementById('cardsView').style.display = 'grid';
            document.getElementById('tableView').style.display = 'none';
        });

        document.getElementById('tableViewBtn').addEventListener('click', () => {
            document.getElementById('tableViewBtn').classList.add('active');
            document.getElementById('cardViewBtn').classList.remove('active');
            document.getElementById('cardsView').style.display = 'none';
            document.getElementById('tableView').style.display = 'block';
        });

        // Filters event listeners
        document.querySelectorAll('.channel-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.channel-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilterChannel = btn.dataset.channel;
                render();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        // Init
        renderUrgency();
        render();
    </script>

</body>

</html>
